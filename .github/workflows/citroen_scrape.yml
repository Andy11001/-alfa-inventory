name: Citroen Daily Scrape

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-citroen:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests beautifulsoup4 python-dotenv
      - run: mkdir -p data
      - name: Run Citroen Inventory Scraper
        run: PYTHONPATH=. python scrapers/citroen_inventory.py
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/citroen_* || true
          git commit -m "Auto: update Citroen feeds [skip ci]" || true
          for i in {1..5}; do
            git pull --rebase origin master && git push origin master && break || sleep 10
          done
      - name: Update Citroen Osobowe Gist
        uses: exuanbo/actions-deploy-gist@v1
        with:
          token: ${{ secrets.GIST_TOKEN }}
          gist_id: fd0b6520af36117e3290271d540a085b
          file_path: data/citroen_osobowe_inventory.csv
      - name: Update Citroen LCV Gist
        uses: exuanbo/actions-deploy-gist@v1
        with:
          token: ${{ secrets.GIST_TOKEN }}
          gist_id: 24fe8de6e88cdc4ad55dabee9f2095f2
          file_path: data/citroen_lcv_inventory.csv
