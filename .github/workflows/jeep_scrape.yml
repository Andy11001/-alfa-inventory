name: Jeep Daily Scrape

on:
  schedule:
    - cron: '15 */4 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-jeep:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests beautifulsoup4 python-dotenv
      - run: mkdir -p data
      - name: Run Jeep Inventory Scraper
        run: PYTHONPATH=. python scrapers/jeep_inventory.py
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/jeep_* || true
          git commit -m "Auto: update Jeep feed [skip ci]" || true
          for i in {1..5}; do
            git pull --rebase origin master && git push origin master && break || sleep 10
          done
      - name: Update Jeep Inventory Gist
        uses: exuanbo/actions-deploy-gist@v1
        with:
          token: ${{ secrets.GIST_TOKEN }}
          gist_id: e991bf64572dea7cf0bb4192912d1bf3
          file_path: data/jeep_inventory.csv
